version: '3.9'

services:
	mongo:
		image: mongo:7.0
		restart: unless-stopped
		ports:
			- '27017:27017'
		volumes:
			- mongo-data:/data/db

	redis:
		image: redis:7-alpine
		restart: unless-stopped
		ports:
			- '6379:6379'
		command: ["redis-server", "--save", "", "--appendonly", "no"]

	backend:
		build:
			context: ..
			dockerfile: docker/be.Dockerfile
		restart: unless-stopped
		environment:
			PORT: 8000
			ENV: local
			MONGODB_URI: mongodb://mongo:27017/hostify
			LOCAL_FRONTEND_URL: http://localhost:4173
			FRONTEND_URL: http://localhost:4173
			UPLOAD_DIR: /app/local
			LOCAL_GITHUB_CLIENT_ID: change-me
			LOCAL_GITHUB_CLIENT_SECRET: change-me
			LOCAL_GITHUB_CALLBACK_URL: http://localhost:8000/api/auth/github/callback
			GITHUB_WEBHOOK_SECRET: dev-secret
			CF_ACCOUNT_ID: local
			CF_KV_NAMESPACE_ID: local
			CF_API_TOKEN: local
			AZURE_STORAGE_ACCOUNT_NAME: local
			AZURE_STORAGE_CONTAINER_NAME: web
			AZURE_STORAGE_SAS_TOKEN: local
		ports:
			- '8000:8000'
		depends_on:
			- mongo
			- redis
		volumes:
			- ../be/local:/app/local

	frontend:
		build:
			context: ..
			dockerfile: docker/fe.Dockerfile
		restart: unless-stopped
		environment:
			PUBLIC_ENV: local
			PUBLIC_API_URL: http://localhost:8000
			PUBLIC_PROD_API_URL: http://localhost:8000
		ports:
			- '4173:4173'
		depends_on:
			- backend

volumes:
	mongo-data:
